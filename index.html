<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粵語語音合成停頓因素測試</title>
    <style>
        body { font-family: 'PingFang HK', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        .container { background-color: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .question-card { border: 1px solid #ddd; padding: 20px; margin-bottom: 25px; border-radius: 10px; }
        .text-content { background: #fff9c4; padding: 12px; border-radius: 5px; font-weight: bold; margin-bottom: 15px; border-left: 5px solid #fbc02d; }
        .audio-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; flex-wrap: wrap; }
        .play-btn { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .rating-group { display: flex; gap: 8px; }
        .submit-btn { width: 100%; padding: 15px; background-color: #007BFF; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>粵語語音合成停頓因素測試</h1>
    <p>請聆聽錄音並評分（1分不舒適，5分非常舒適）：</p>

    <form id="testForm">
        <div style="margin-bottom: 20px; background: #f0f7ff; padding: 15px; border-radius: 8px;">
            <label><strong>您的姓名：</strong></label>
            <input type="text" name="testerName" required placeholder="請輸入姓名">
        </div>

        <div id="mainContent">
            </div>

        <button type="submit" class="submit-btn" id="submitBtn">提交所有結果</button>
    </form>
</div>

<script>
    // ⚠️ 檢查點 1：請確保網址在引號內，且只有一行
    const SCRIPT_URL = '你的_GOOGLE_APPS_SCRIPT_網址';

    const texts = [
        "記得朝早八點食兩粒血壓藥。食完藥半個鐘後量一次血壓，記錄低。如果血壓高過一百四，就要打電話通知護士。",
        "小心血糖唔好升太高。千祈唔好食甜嘢，包括蛋糕、奶茶同朱古力。食完飯兩個鐘後可以量一次血糖。",
        "醫生講咗要聽日九點去醫院覆診。記得帶住綠色病歷簿、身份證同最近七日嘅藥單。遲到可能會取消預約。",
        "食藥前要先量血壓同血糖。量完如果血壓高或者血糖高，就要即刻通知家人。唔好自己亂加藥。",
        "個重要檢查要朝早空腹做。做完先可以食清淡早餐，例如粥或者麵包。唔好食油炸或者太甜嘅東西。",
        "返屋企後記得飲一杯暖水。飲水後半個鐘可以食藥，唔好太急。食完藥最好坐低休息十分鐘。",
        "兩粒降血壓藥飯後食。食完記得行廿分鐘，對血管同心臟都有好處。行路時要扶住欄杆。",
        "慢慢行樓梯，一定要扶住欄杆。小心跌倒，尤其地面濕滑或者光線不足嘅時候。穿防滑鞋會安全啲。",
        "血壓高就要坐低休息。休息夠十分鐘再量一次，睇吓有冇回落到正常水平。如果仲高就打電話問醫生。",
        "聽日去社區健康中心做年度檢查。記得朝早八點到，帶住綠色病歷簿同身份證。中心位於街市三樓。",
        "如果覺得頭暈或者眼前發黑，立即坐低或者攞住牆。千祈唔好勉強繼續行路。坐定後深呼吸幾次。",
        "食完晚飯半個鐘後量血糖。正常值應該係七點八以下，記低數字下次覆診比醫生睇。唔好忘記記錄。",
        "個新開嘅藥要每日三次，每次一粒。飯後食，持續一星期。食完如果皮膚出疹就要停藥。",
        "天氣熱，出街記得帶遮、水同帽子。唔好喺太陽底行太久，容易中暑。如果覺得唔舒服就要即刻入室。",
        "覆診時間改咗，係後日十點。請準時到診所，帶住最新嘅藥袋。遲到十五分鐘可能會取消預約。"
    ];

    const main = document.getElementById('mainContent');

    // 渲染題目
    try {
        texts.forEach((txt, i) => {
            const qNum = i + 1;
            const card = document.createElement('div');
            card.className = 'question-card';
            
            let html = `<h3>第 ${qNum} 題</h3><div class="text-content">${txt}</div>`;
            
            // 生成三個版本
            const versions = [
                { id: `N${qNum}`, label: '版本 1' },
                { id: `P${qNum}_v1`, label: '版本 2' },
                { id: `P${qNum}_v2`, label: '版本 3' }
            ];

            versions.forEach((v, idx) => {
                const audioPath = `Audio/${v.id}.mp3`;
                html += `
                <div class="audio-row">
                    <span>${v.label}</span>
                    <audio id="aud_${qNum}_${idx}" src="${audioPath}"></audio>
                    <button type="button" class="play-btn" onclick="playAudio('aud_${qNum}_${idx}')">▶ 播放</button>
                    <div class="rating-group">
                        ${[1,2,3,4,5].map(n => `<label><input type="radio" name="q${qNum}_v${idx+1}" value="${n}" required> ${n}</label>`).join('')}
                    </div>
                </div>`;
            });
            card.innerHTML = html;
            main.appendChild(card);
        });
    } catch (err) {
        document.write("程式載入出錯，請檢查程式碼是否完整貼上。錯誤：" + err);
    }

    function playAudio(id) {
        const a = document.getElementById(id);
        a.pause();
        a.currentTime = 0;
        a.play().catch(e => alert("播放失敗，請檢查 Audio 資料夾是否有檔案：" + a.getAttribute('src')));
    }

    document.getElementById('testForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "提交中...";

        const data = {};
        const fd = new FormData(this);
        fd.forEach((v, k) => data[k] = v);

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        }).then(() => {
            alert("提交成功！感謝參與。");
            location.reload();
        }).catch(() => {
            alert("提交失敗，請檢查網路。");
            btn.disabled = false;
        });
    };
</script>
</body>
</html>
