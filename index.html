<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粵語語音合成停頓因素測試</title>
    <style>
        /* 基礎樣式與字體優化 */
        :root {
            --primary-color: #0056b3;
            --secondary-color: #f8f9fa;
            --accent-color: #28a745;
            --text-dark: #2c3e50;
            --bg-light: #f4f7f9;
        }

        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', -apple-system, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* 標題與導言區 */
        header {
            text-align: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 30px;
            padding-bottom: 20px;
        }

        h1 { color: var(--primary-color); margin-bottom: 10px; }
        .intro-box {
            background: #e9f2ff;
            padding: 20px;
            border-radius: 8px;
            font-size: 0.95em;
            color: #444;
            border-left: 5px solid var(--primary-color);
        }

        /* 姓名區 */
        .name-section {
            margin: 30px 0;
            padding: 20px;
            background: var(--secondary-color);
            border-radius: 10px;
        }
        .name-input {
            width: 100%;
            max-width: 300px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            margin-top: 10px;
        }

        /* 題目卡片 */
        .question-card {
            background: #fff;
            border: 1px solid #eaeaea;
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 12px;
            transition: transform 0.2s;
        }
        .question-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .question-header { font-weight: bold; color: var(--primary-color); margin-bottom: 15px; font-size: 1.2em; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
        
        .text-content {
            background: #fffbe6;
            padding: 15px;
            border-radius: 8px;
            color: #555;
            font-weight: 500;
            margin-bottom: 20px;
            border: 1px dashed #ffe58f;
        }

        /* 錄音行樣式 */
        .audio-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f9f9f9;
            flex-wrap: wrap;
            gap: 15px;
        }
        .version-label { font-weight: 600; min-width: 80px; }
        
        .play-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .play-btn:hover { background-color: #218838; opacity: 0.9; }

        /* 評分區 */
        .rating-group { display: flex; align-items: center; gap: 12px; }
        .rating-group label {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.85em;
        }
        .rating-group input { width: 18px; height: 18px; margin-bottom: 4px; cursor: pointer; }

        /* 感謝與提交 */
        .thanks-box {
            margin-top: 50px;
            text-align: center;
            padding: 30px;
            border-top: 2px solid #eee;
        }
        .submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,86,179,0.3);
            transition: 0.3s;
        }
        .submit-btn:hover { transform: scale(1.05); background-color: #004494; }
        .submit-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        @media (max-width: 600px) {
            .audio-row { flex-direction: column; align-items: flex-start; }
            .rating-group { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>粵語語音合成停頓因素測試</h1>
        <p>Cantonese TTS Pause Factor Evaluation</p>
    </header>

    <div class="intro-box">
        <strong>測試說明：</strong><br>
        感謝參與本次語音合成研究！請依次聆聽下列 15 組句子，每組句子有三個不同的合成版本。
        請根據<b>「理解的輕鬆程度」</b>與<b>「聽感舒適度」</b>，為每個版本給予評分。<br>
        (1分：非常不滿意 ➔ 5分：非常滿意)
    </div>

    <form id="testForm">
        <div class="name-section">
            <label><strong>1. 您的姓名：</strong></label><br>
            <input type="text" name="testerName" class="name-input" required placeholder="請輸入姓名以作記錄">
        </div>

        <div id="mainContent">
            </div>

        <div class="thanks-box">
            <p style="color: #666; margin-bottom: 20px;">您的寶貴意見將極大幫助我們的研究，再次感謝您的支持！</p>
            <button type="submit" class="submit-btn" id="submitBtn">提交所有評分</button>
        </div>
    </form>
</div>

<script>
    // --------------------------------------------------
    // ⚠️ 關鍵設定區
    // --------------------------------------------------
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwCTcvQkhGnLRIEZJsFMswk-8cflJ-3jAScv-2TFsn3wxwBsTLhnvlZFJmp5nEJIWvXYw/exec'; // 填入你的 Google 網址
    
    // 如果你的錄音檔在一個名為 Audio 的資料夾裡，請保持 'Audio/'
    // 如果你的錄音檔直接跟 index.html 放在一起，請把下面改為 '' (留空)
    const AUDIO_FOLDER = ''; 

    const myTexts = [
        "記得朝早八點食兩粒血壓藥。食完藥半個鐘後量一次血壓，記錄低。如果血壓高過一百四，就要打電話通知護士。",
        "小心血糖唔好升太高。千祈唔好食甜嘢，包括蛋糕、奶茶同朱古力。食完飯兩個鐘後可以量一次血糖。",
        "醫生講咗要聽日九點去醫院覆診。記得帶住綠色病歷簿、身份證同最近七日嘅藥單。遲到可能會取消預約。",
        "食藥前要先量血壓同血糖。量完如果血壓高或者血糖高，就要即刻通知家人。唔好自己亂加藥。",
        "個重要檢查要朝早空腹做。做完先可以食清淡早餐，例如粥或者麵包。唔好食油炸或者太甜嘅東西。",
        "返屋企後記得飲一杯暖水。飲水後半個鐘可以食藥，唔好太急。食完藥最好坐低休息十分鐘。",
        "兩粒降血壓藥飯後食。食完記得行廿分鐘，對血管同心臟都有好處。行路時要扶住欄杆。",
        "慢慢行樓梯，一定要扶住欄杆。小心跌倒，尤其地面濕滑或者光線不足嘅時候。穿防滑鞋會安全啲。",
        "血壓高就要坐低休息。休息夠十分鐘再量一次，睇吓有冇回落到正常水平。如果仲高就打電話問醫生。",
        "聽日去社區健康中心做年度檢查。記得朝早八點到，帶住綠色病歷簿同身份證。中心位於街市三樓。",
        "如果覺得頭暈或者眼前發黑，立即坐低或者攞住牆。千祈唔好勉強繼續行路。坐定後深呼吸幾次。",
        "食完晚飯半個鐘後量血糖。正常值應該係七點八以下，記低數字下次覆診比醫生睇。唔好忘記記錄。",
        "個新開嘅藥要每日三次，每次一粒。飯後食，持續一星期。食完如果皮膚出疹就要停藥。",
        "天氣熱，出街記得帶遮、水同帽子。唔好喺太陽底行太久，容易中暑。如果覺得唔舒服就要即刻入室。",
        "覆診時間改咗，係後日十點。請準時到診所，帶住最新嘅藥袋。遲到十五分鐘可能會取消預約。"
    ];

    // --------------------------------------------------
    // 動態生成畫面
    // --------------------------------------------------
    const main = document.getElementById('mainContent');

    myTexts.forEach((txt, i) => {
        const qNum = i + 1;
        const card = document.createElement('div');
        card.className = 'question-card';
        
        let html = `<div class="question-header">第 ${qNum} 組測試</div>
                    <div class="text-content">「${txt}」</div>`;
        
        const versions = [
            { id: `N${qNum}`, label: '合成版本 A' },
            { id: `P${qNum}_v1`, label: '合成版本 B' },
            { id: `P${qNum}_v2`, label: '合成版本 C' }
        ];

        versions.forEach((v, idx) => {
            const audioPath = `${AUDIO_FOLDER}${v.id}.mp3`;
            html += `
            <div class="audio-row">
                <span class="version-label">${v.label}</span>
                <audio id="aud_${qNum}_${idx}" src="${audioPath}"></audio>
                <button type="button" class="play-btn" onclick="playAudio('aud_${qNum}_${idx}')"><span>▶</span> 點擊播放</button>
                <div class="rating-group">
                    ${[1,2,3,4,5].map(n => `
                        <label><input type="radio" name="q${qNum}_v${idx+1}" value="${n}" required>${n}</label>
                    `).join('')}
                    <span style="font-size:12px; color:#999; margin-left:5px;">(評分)</span>
                </div>
            </div>`;
        });
        card.innerHTML = html;
        main.appendChild(card);
    });

    // 播放邏輯
    function playAudio(id) {
        const a = document.getElementById(id);
        // 先停止所有正在播放的聲音
        document.querySelectorAll('audio').forEach(audio => {
            audio.pause();
            audio.currentTime = 0;
        });
        a.play().catch(e => {
            alert("播放出錯！\n請檢查檔案：" + a.getAttribute('src') + "\n(提示：請檢查 Audio 資料夾名稱及大小寫)");
        });
    }

    // 提交邏輯
    document.getElementById('testForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "正在加密提交，請稍候...";

        const data = {};
        new FormData(this).forEach((v, k) => data[k] = v);

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        }).then(() => {
            alert("提交成功！感謝您的參與，辛苦了。");
            window.scrollTo(0, 0);
            location.reload();
        }).catch(() => {
            alert("網絡提交失敗，請檢查連線。");
            btn.disabled = false;
            btn.innerText = "提交所有評分";
        });
    };
</script>
</body>
</html>
